// ===================== SOUND SYSTEM =====================
const AudioCtx = typeof window !== "undefined" && (window.AudioContext || window.webkitAudioContext)
  ? new (window.AudioContext || window.webkitAudioContext)() : null;
function resumeAudio() { if (AudioCtx?.state === "suspended") AudioCtx.resume(); }

// リーチ後の「ピッ」電子音
function playBeepSound() {
  if (!AudioCtx) return; resumeAudio();
  const t = AudioCtx.currentTime;
  const osc = AudioCtx.createOscillator();
  const gain = AudioCtx.createGain();
  osc.type = "sine";
  osc.frequency.setValueAtTime(1320, t);
  osc.frequency.exponentialRampToValueAtTime(1100, t + 0.12);
  gain.gain.setValueAtTime(0.0, t);
  gain.gain.linearRampToValueAtTime(0.6, t + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
  osc.connect(gain); gain.connect(AudioCtx.destination);
  osc.start(t); osc.stop(t + 0.18);
}

// 副露「ポンッ」音（ワンテンポ遅らせて呼ぶ）
function playPonSound() {
  if (!AudioCtx) return; resumeAudio();
  const sr = AudioCtx.sampleRate, dur = 0.22;
  const buf = AudioCtx.createBuffer(1, sr * dur, sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    const t = i / sr, env = Math.exp(-t * 18);
    d[i] = Math.sin(2*Math.PI*260*t)*env*0.75
      + Math.sin(2*Math.PI*520*t)*env*0.35
      + Math.sin(2*Math.PI*130*t)*env*0.25
      + (Math.random()*2-1)*env*0.1;
  }
  const src = AudioCtx.createBufferSource(); src.buffer = buf;
  const g = AudioCtx.createGain();
  g.gain.setValueAtTime(0.9, AudioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AudioCtx.currentTime + dur);
  src.connect(g); g.connect(AudioCtx.destination); src.start();
}

function playRiichiSound() {
  if (AudioCtx && AudioCtx.state === "suspended") AudioCtx.resume();
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance("リーチ");
      u.lang = "ja-JP"; u.rate = 1.0; u.pitch = 1.1; u.volume = 1.0;
      u.onend = () => setTimeout(playBeepSound, 80);
      window.speechSynthesis.speak(u);
    }, 60);
  } else {
    playBeepSound();
  }
}

// 副露音：AudioContext確実に起動してから遅らせて鳴らす
function playFuuroSound() {
  if (!AudioCtx) return;
  const doPlay = () => setTimeout(playPonSound, 180);
  if (AudioCtx.state === "suspended") { AudioCtx.resume().then(doPlay); }
  else { doPlay(); }
}

function ceil100(n) { return Math.ceil(n / 100) * 100; }

function getLimit(han, fu, kiriage=true) {
  if (han >= 13) return LIMITS.find(l => l.key === "yakuman");
  if (han >= 11) return LIMITS.find(l => l.key === "sanbaiman");
  if (han >= 8)  return LIMITS.find(l => l.key === "baiman");
  if (han >= 6)  return LIMITS.find(l => l.key === "hanemangan");
  if (han >= 5)  return LIMITS.find(l => l.key === "mangan");
  // 通常満貫（常に）
  if (han === 4 && fu >= 40) return LIMITS.find(l => l.key === "mangan");
  if (han === 3 && fu >= 70) return LIMITS.find(l => l.key === "mangan");
  // 繰り上げ満貫（kirageオンのみ）
  if (kiriage) {
    if (han === 4 && fu === 30) return LIMITS.find(l => l.key === "mangan");
    if (han === 3 && fu === 60) return LIMITS.find(l => l.key === "mangan");
  }
  return null;
}

function getRonPts(han, fu, isOya, kiriage=true) {
  const lim = getLimit(han, fu, kiriage);
  if (lim) return isOya ? lim.ronO : lim.ron;
  if (isOya) return RON_OYA[fu]?.[han] ?? null;
  return RON_KO[fu]?.[han] ?? null;
}

function tsumoDeltas(han, fu, isOya, winIdx, oyaIdx, n, honba, kyotaku, kiriage=true) {
  const lim = getLimit(han, fu, kiriage);
  const delta = Array(n).fill(0);
  let tot = 0;
  if (isOya) {
    const all = lim ? lim.tOya : (TSUMO_OYA[fu]?.[han] ?? null);
    if (all === null) return null;
    const pay = all + honba * 100;
    for (let i = 0; i < n; i++) { if (i === winIdx) continue; delta[i] = -pay; tot += pay; }
  } else {
    if (lim) {
      const ko = lim.tKo + honba * 100, oya = lim.tOya + honba * 100;
      for (let i = 0; i < n; i++) {
        if (i === winIdx) continue;
        const pay = i === oyaIdx ? oya : ko;
        delta[i] = -pay; tot += pay;
      }
    } else {
      const row = TSUMO_KO[fu]?.[han]; if (!row) return null;
      const ko = ceil100(row[0]) + honba * 100, oya = ceil100(row[1]) + honba * 100;
      for (let i = 0; i < n; i++) {
        if (i === winIdx) continue;
        const pay = i === oyaIdx ? oya : ko;
        delta[i] = -pay; tot += pay;
      }
    }
  }
  // kyotakuには「今局でリーチした人の棒」は含まない（リーチ者のdeltaは既にpoints上で-1000済み）
  // kyotakuは前局までの供託本数のみ
  delta[winIdx] = tot + kyotaku * 1000;
  return delta;
}

function tsumoPreview(han, fu, isOya, kiriage=true) {
  const lim = getLimit(han, fu, kiriage);
  if (isOya) {
    const all = lim ? lim.tOya : TSUMO_OYA[fu]?.[han];
    if (!all) return "－";
    return `${all.toLocaleString()}オール`;
  }
  if (lim) return `子${lim.tKo.toLocaleString()}/親${lim.tOya.toLocaleString()}`;
  const row = TSUMO_KO[fu]?.[han];
  if (!row) return "－";
  return `子${ceil100(row[0]).toLocaleString()}/親${ceil100(row[1]).toLocaleString()}`;
}

// ===================== UTILS =====================
function loadS(key, def) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } }
function saveS(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

function calcFinalScore(pts, settings, rounds) {
  const { returnPoints, uma, yakitori=0, tobiBonus=0 } = settings;
  const raw = pts.map(p => p - returnPoints);
  const ranked = [...raw.map((v, i) => ({ i, v }))].sort((a, b) => b.v - a.v);
  // 小数第一位まで（/1000して四捨五入1桁）
  const res = Array(pts.length).fill(0);
  ranked.forEach(({ i }, rank) => {
    res[i] = Math.round(raw[i] / 100) / 10 + (uma[rank] ?? 0);
  });

  // オカ: (返し点 - 持ち点) × 4 / 1000 をトップに加算
  const oka = (returnPoints - settings.startPoints) * 4 / 1000;
  if (oka !== 0) res[ranked[0].i] += oka;

  // 焼き鳥
  if (yakitori && rounds) {
    const winFlags = pts.map((_, i) => rounds.some(r => r.delta[i] > 0 && r.info?.type));
    winFlags.forEach((won, i) => {
      if (!won) {
        res[i] -= Math.abs(yakitori);
        const winners = winFlags.map((w,j)=>w?j:-1).filter(j=>j>=0);
        if (winners.length > 0) {
          const share = Math.abs(yakitori) / winners.length;
          winners.forEach(j => { res[j] += share; });
        }
      }
    });
  }

  // トビ賞
  if (tobiBonus && rounds) {
    pts.forEach((p, i) => {
      if (p < 0) {
        res[i] -= Math.abs(tobiBonus);
        res[ranked[0].i] += Math.abs(tobiBonus);
      }
    });
  }

  // 小数第一位に丸める
  return res.map(v => Math.round(v * 10) / 10);
}

// スコア表示用（小数第一位、+符号付き）
function fmtScore(v) {
  const n = Math.round(v * 10) / 10;
  const s = n.toFixed(1);
  return n >= 0 ? `+${s}` : s;
}
// ── CSV共通ユーティリティ ──
function csvEscape(v) {
  const s = String(v ?? "");
  return s.includes(",") || s.includes('"') || s.includes('\n')
    ? `"${s.replace(/"/g, '""')}"` : s;
}
function downloadCsv(rows, filename) {
  const csv = rows.map(r => r.map(csvEscape).join(",")).join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8"}));
  a.download = filename; a.click();
}

// ── サマリーCSV（対局単位） ──
function exportSummaryCSV(games) {
  const allP = [...new Set(games.flatMap(g => g.players))];
  const hdrs = [
    "対局ID","日時","形式","局数","持ち点","返し点",
    "ウマ1位","ウマ2位","ウマ3位","ウマ4位",
    ...allP.flatMap(p=>[p+"_順位", p+"_最終持点", p+"_スコア"]),
  ];
  const rows = games.map(g => {
    const fp = g.players.map((_,i) => g.rounds.reduce((s,r)=>s+(r.delta[i]??0), g.settings.startPoints));
    const fins = calcFinalScore(fp, g.settings, g.rounds);
    const ranked = [...fins.map((v,i)=>({v,i}))].sort((a,b)=>b.v-a.v);
    const rankOf = i => ranked.findIndex(x=>x.i===i)+1;
    return [
      g.id, g.date,
      g.settings.gameType==="tonpu"?"東風":"半荘",
      g.rounds.length,
      g.settings.startPoints,
      g.settings.returnPoints,
      ...g.settings.uma,
      ...allP.flatMap(p => {
        const i = g.players.indexOf(p);
        if (i < 0) return ["","",""];
        return [rankOf(i), fp[i], fins[i]];
      }),
    ];
  });
  downloadCsv([hdrs, ...rows], "mahjong_summary.csv");
}

  const rows = [];
  games.forEach(g => {

    g.rounds.forEach((r, ri) => {

      const roundNum = (totalPlayed % 4) + 1;
      const oyaIdx = (dealerStart + totalPlayed) % 4;

      const getPlayerVal = (arr, i, def="") => arr?.[i] ?? def;
      const getRiichiOrder = (pIdx) => {
        const o = r.riichiOrder?.find(x=>x.pIdx===pIdx);
        return o ? o.orderInRound : "";
      };

      rows.push([
        g.id, g.date,
        g.settings.gameType==="tonpu"?"東風":"半荘",
        r.roundLabel || `${["東","南","西","北"][wind]}${roundNum}局`,
        g.players[oyaIdx] ?? "",
        // プレイヤー名
        g.players[0]??"", g.players[1]??"", g.players[2]??"", g.players[3]??"",
        // delta
        r.delta[0]??0, r.delta[1]??0, r.delta[2]??0, r.delta[3]??0,
        // 状態
        getPlayerVal(r.roundStatus,0), getPlayerVal(r.roundStatus,1),
        getPlayerVal(r.roundStatus,2), getPlayerVal(r.roundStatus,3),
        // 副露数
        getPlayerVal(r.fuuroCount,0,0), getPlayerVal(r.fuuroCount,1,0),
        getPlayerVal(r.fuuroCount,2,0), getPlayerVal(r.fuuroCount,3,0),
        // リーチ順
        getRiichiOrder(0), getRiichiOrder(1), getRiichiOrder(2), getRiichiOrder(3),
        // 結果
        r.info?.chonbo ? "チョンボ"
          : r.info?.ryukyoku ? "流局"
          : r.info?.type==="tsumo" ? "ツモ"
          : r.info?.type==="ron" ? "ロン" : "",
        // 和了者（deltaがプラスでtypeがあるプレイヤー）
        r.info?.type ? (g.players[r.delta.findIndex((d,i)=>d>0&&r.info?.from!==i)] ?? "") : "",
        // 放銃者
        r.info?.from!=null ? (g.players[r.info.from] ?? "") : "",
        r.info?.type ?? "",
        r.info?.han ?? "",
        r.info?.fu ?? "",
        (r.info?.yaku ?? []).join("|"),
        r.info?.yakuPai ?? "",
        r.info?.dora ?? "",
        r.info?.aka ?? "",
        r.info?.ura ?? "",
        r.info?.baseScore ?? "",
        r.info?.isFirstRiichi ? 1 : "",
        r.info?.riichiOrder ?? "",
        r.info?.chonbo ? 1 : "",
        r.info?.ryukyoku ? 1 : "",
        r.info?.oyaTenpai ? 1 : "",
      ]);
    });
  });
  downloadCsv([hdrs, ...rows], "mahjong_detail.csv");
}

// ── インポート（詳細CSV → games復元） ──
function importDetailCSV(csvText, existingGames) {
  const lines = csvText.trim().split("\n");
  const headers = lines[0].split(",").map(h=>h.replace(/^"|"$/g,"").trim());
  const dataRows = lines.slice(1).map(l => {
    // 簡易CSVパース（カンマ区切り、引用符考慮）
    const cells = []; let cur = "", inQ = false;
    for (const ch of l) {
      if (ch==='"') { inQ=!inQ; }
      else if (ch===',' && !inQ) { cells.push(cur); cur=""; }
      else { cur+=ch; }
    }
    cells.push(cur);
    return cells;
  });

  // 対局IDでグループ化
  const gMap = {};
  dataRows.forEach(row => {
    const get = (key) => { const i=headers.indexOf(key); return i>=0?row[i]??"":""; };
    const gid = get("対局ID");
    if (!gid) return;
    if (!gMap[gid]) {
      gMap[gid] = {
        id: gid,
        date: get("日時"),
        settings: {
          gameType: get("形式")==="東風"?"tonpu":"hanchan",
          startPoints: 25000, returnPoints: 30000,
          uma: [10,20,-10,-20], notenPenalty: 3000,
          tobiEnd: true, doubleRon: true, nyu: true, kiriage: true,
        },
        players: [get("P1名"),get("P2名"),get("P3名"),get("P4名")].filter(Boolean),
        rounds: [],
      };
    }
    const g = gMap[gid];
    const delta = [0,1,2,3].map(i=>parseInt(get(`P${i+1}_delta`))||0);
    const roundStatus = [0,1,2,3].map(i=>get(`P${i+1}_状態"`) || get(`P${i+1}_状態`) || null);
    const fuuroCount = [0,1,2,3].map(i=>parseInt(get(`P${i+1}_副露数`))||0);
    const yaku = get("役リスト") ? get("役リスト").split("|").filter(Boolean) : [];
    const result = get("結果");
    const info = {
      type: result==="ツモ"?"tsumo":result==="ロン"?"ron":null,
      han: parseInt(get("翻数"))||null,
      fu: parseInt(get("符数"))||null,
      yaku,
      yakuPai: parseInt(get("役牌数"))||0,
      dora: parseInt(get("表ドラ"))||0,
      aka: parseInt(get("赤ドラ"))||0,
      ura: parseInt(get("裏ドラ"))||0,
      baseScore: parseInt(get("基本点(役なし)"))||null,
      isFirstRiichi: get("先制リーチ")==="1",
      from: (() => {
        const name = get("放銃者"); if(!name) return null;
        const i = g.players.indexOf(name); return i>=0?i:null;
      })(),
      ryukyoku: get("流局")==="1",
      oyaTenpai: get("親テンパイ流局")==="1",
      chonbo: get("チョンボ")==="1",
      renchon: false,
    };
    g.rounds.push({
      delta, roundStatus, fuuroCount,
      riichiOrder: [],
      roundLabel: get("局名"),
      info,
    });
  });

  return Object.values(gMap);
}

  const [games, setGames] = useState([]);
  const [gameState, setGameState] = useState(null);
  const [viewingGame, setViewingGame] = useState(null);

  // 起動時：保存済みセッションを復元
  useEffect(() => {
    const init = async () => {
      const saved = loadSession();
      if (!saved?.access_token) { setAuthLoading(false); return; }

      // まずそのままデータ取得を試みる
      try {
        await loadUserData(saved.access_token);
        setSession(saved);
      } catch(e) {
        // 失敗した場合、refresh_tokenで再取得を試みる
        if (saved.refresh_token) {
          try {
            const res = await sb.refreshToken(saved.refresh_token);
            if (res.access_token) {
              const newSess = {
                access_token: res.access_token,
                refresh_token: res.refresh_token,
                user: res.user ?? saved.user,
              };
              setSession(newSess);
              saveSession(newSess);
              await loadUserData(res.access_token);
            } else {
              setAuthLoading(false);
            }
          } catch(e2) {
            setAuthLoading(false);
          }
        } else {
          setAuthLoading(false);
        }
      }
    };
    init();
  }, []);

  // visibilitychangeで再同期（iOS PWAのfocusイベント非発火対策）
  useEffect(() => {
    const onVisible = () => {
      const saved = loadSession();
      if (saved?.access_token && !gameState) {
        sb.getGames(saved.access_token).then(g => { if(g.length>0) setGames(g); }).catch(()=>{});
      }
    };
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") onVisible();
    });
    window.addEventListener("focus", onVisible);
    return () => {
      document.removeEventListener("visibilitychange", onVisible);
      window.removeEventListener("focus", onVisible);
    };
  }, [gameState]);

  const loadUserData = async (token) => {
    setSyncing(true);
    try {
      const profile = await sb.getProfile(token);
      if (profile) {
        if (profile.members?.length) setMembers(profile.members);
        if (profile.settings && Object.keys(profile.settings).length) setSettings(s => ({...s, ...profile.settings}));
      }
      const gamesData = await sb.getGames(token);
      // 401エラーチェック（配列でなければ認証エラー）
      if (!Array.isArray(gamesData)) throw new Error("auth_error");
      setGames(gamesData);
    } catch(e) {
      setSyncing(false);
      setAuthLoading(false);
      throw e; // 呼び出し元でcatchできるように再スロー
    }
    setSyncing(false);
    setAuthLoading(false);
  };

  const handleAuth = async (email, password) => {
    setSyncing(true);
    const res = authMode === "signup"
      ? await sb.signUp(email, password)
      : await sb.signIn(email, password);
    if (res.access_token) {
      const sess = {
        access_token: res.access_token,
        refresh_token: res.refresh_token,
        user: res.user,
      };
      setSession(sess);
      saveSession(sess);
      await loadUserData(res.access_token);
    } else {
      alert(res.error_description || res.msg || "認証エラー");
    }
    setSyncing(false);
  };

  const handleRefresh = async () => {
    if (!session) return;
    setSyncing(true);
    try {
      const g = await sb.getGames(session.access_token);
      setGames(g);
    } catch(e) { console.error(e); }
    setSyncing(false);
  };

  const handleSignOut = async () => {
    if (session) await sb.signOut(session.access_token);
    setSession(null);
    saveSession(null);
    setGames([]); setMembers([]);
    setSettings(DEFAULT_SETTINGS);
  };

  // 設定・メンバーが変わったらクラウドに保存
  useEffect(() => {
    if (!session) return;
    const t = setTimeout(() => {
      sb.upsertProfile(session.access_token, session.user.id, members, settings);
    }, 1000);
    return () => clearTimeout(t);
  }, [settings, members, session]);

  const startGame = (players, oyaStart) => {
    setGameState({
      players: [...players], settings: { ...settings }, rounds: [],
      currentRound: { wind:0, round:1, honba:0, kyotaku:0, dealerStart: oyaStart },
      points: players.map(() => settings.startPoints),
      kyotakuPoints: 0,  // 供託として場に出ている点数合計（points合計+kyotakuPoints=定数）
      roundStatus: players.map(() => null),
      fuuroCount: players.map(() => 0),
      riichiOrder: [], totalRiichiCount: 0,
    });
    setTab("game");
  };

  const finishGame = async (gs) => {
    const g = { ...gs, date: new Date().toLocaleString("ja-JP"), id: Date.now() };
    const newGames = [g, ...games];
    setGames(newGames);
    setGameState(null);
    setViewingGame(g);
    setTab("history");

    if (session) {
      setSyncing(true);
      try {
        await sb.saveGame(session.access_token, session.user.id, g);
        // 保存成功を確認するため再取得
        const updated = await sb.getGames(session.access_token);
        setGames(updated);
      } catch(e) {
        console.error("保存エラー:", e);
        // トークン期限切れの可能性 → 再ログインを促す
        alert("⚠️ クラウドへの保存に失敗しました。\n一度ログアウトして再ログインしてください。\nデータはこの画面を閉じるまで表示されています。");
      }
      setSyncing(false);
    }
  };

  const handleDeleteGame = async (gameId) => {
    setGames(p => p.filter(x => x.id !== gameId));
    if (session) {
      try { await sb.deleteGame(session.access_token, gameId); }
      catch(e) { console.error("削除エラー:", e); }
    }
  };

  const handleDeleteAllGames = async () => {
    setGames([]);
    if (session) {
      try { await sb.deleteAllGames(session.access_token, session.user.id); }
      catch(e) { console.error("全削除エラー:", e); }
    }
  };

  // 未ログイン時はログイン画面を表示
  if (authLoading) {
    return (
      <>
        <style>{css}</style>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"var(--bg)"}}>
          <div style={{textAlign:"center",color:"var(--tx2)",fontSize:14}}>読み込み中...</div>
        </div>
      </>
    );
  }

  if (!session) {
    return (
      <>
        <style>{css}</style>
        <AuthScreen mode={authMode} setMode={setAuthMode} onAuth={handleAuth} loading={syncing}/>
      </>
    );
  }

  return (
    <>
      <style>{css}</style>
      <div className="app">
        {syncing && (
          <div style={{position:"fixed",top:0,left:0,right:0,zIndex:300,
            background:"var(--ac)",padding:"3px",textAlign:"center",fontSize:10,color:"#fff"}}>
            同期中...
          </div>
        )}
        {tab==="game" && !gameState && <SetupScreen members={members} settings={settings} onStart={startGame}/>}
        {tab==="game" && gameState && <GameScreen gameState={{...gameState,allGames:games}} setGameState={setGameState} onFinish={finishGame}/>}
        {tab==="history" && <HistoryScreen games={games}
          onDeleteGame={handleDeleteGame} onDeleteAll={handleDeleteAllGames}
          onRefresh={handleRefresh}
          viewing={viewingGame} setViewing={setViewingGame}/>}
        {tab==="stats" && <StatsScreen games={games} onRefresh={handleRefresh}/>}
        {tab==="settings" && <SettingsScreen settings={settings} setSettings={setSettings}
          members={members} setMembers={setMembers} games={games}
          userEmail={session.user.email} onSignOut={handleSignOut}/>}
        {!gameState && (
          <nav className="nav">
            {[
              { k:"game", l:"対局", svg:(
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/><circle cx="7" cy="7" r="1.5" className="ni-fill"/><circle cx="17" cy="17" r="1.5" className="ni-fill"/></svg>
              )},
              { k:"history", l:"履歴", svg:(
                <svg viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h10M4 18h7"/></svg>
              )},
              { k:"stats", l:"集計", svg:(
                <svg viewBox="0 0 24 24"><polyline points="3,17 8,11 13,14 21,6"/><circle cx="8" cy="11" r="1.2" className="ni-fill"/><circle cx="13" cy="14" r="1.2" className="ni-fill"/></svg>
              )},
              { k:"settings", l:"設定", svg:(
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
              )},
            ].map(n=>(
              <button key={n.k} className={`ni${tab===n.k?" on":""}`} onClick={()=>setTab(n.k)}>
                <div className="ni-icon">{n.svg}</div>
                <span>{n.l}</span>
              </button>
            ))}
          </nav>
        )}
      </div>
    </>
  );
}

// ===================== LOGO SVG =====================
function MjLogo({ size = 80 }) {
  // 麻雀牌の比率: 縦4 横3 → width=size*0.75, height=size
  const w = size * 0.75;
  const h = size;
  const cx = w / 2;
  const cy = h / 2;
  const r  = Math.min(w, h) * 0.33;  // 扇形の外径
  const ri = Math.min(w, h) * 0.18;  // 扇形の内径（棒グラフ用スペース）

  const toRad = d => d * Math.PI / 180;
  const arc = (startDeg, endDeg) => {
    const x1  = cx + r  * Math.cos(toRad(startDeg));
    const y1  = cy + r  * Math.sin(toRad(startDeg));
    const x2  = cx + r  * Math.cos(toRad(endDeg));
    const y2  = cy + r  * Math.sin(toRad(endDeg));
    const xi1 = cx + ri * Math.cos(toRad(startDeg));
    const yi1 = cy + ri * Math.sin(toRad(startDeg));
    const xi2 = cx + ri * Math.cos(toRad(endDeg));
    const yi2 = cy + ri * Math.sin(toRad(endDeg));
    const lg = endDeg - startDeg > 180 ? 1 : 0;
    return `M${xi1},${yi1} L${x1},${y1} A${r},${r} 0 ${lg} 1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${lg} 0 ${xi1},${yi1}Z`;
  };

  const sw = size * 0.018; // stroke width
  const rx = size * 0.08;  // 牌の丸角

  // 人物アイコン（円のみ）
  const person = (px, py) => {
    const pr = size * 0.042;
    return (
      <g key={`${px}-${py}`}>
        <circle cx={px} cy={py} r={pr} fill="white" stroke="#111" strokeWidth={sw*0.8}/>
        <circle cx={px} cy={py} r={pr*0.45} fill="#111"/>
      </g>
    );
  };

  const shadow = size * 0.05;

  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{flexShrink:0,overflow:"visible"}}>
      {/* 牌の影（奥行き感） */}
      <rect x={shadow} y={shadow} width={w-size*0.04} height={h-size*0.04}
        rx={rx} ry={rx} fill="#666"/>
      {/* 牌の本体 */}
      <rect x={0} y={0} width={w-size*0.02} height={h-size*0.02}
        rx={rx} ry={rx} fill="white" stroke="#111" strokeWidth={sw}/>
      {/* 内枠 */}
      <rect x={size*0.04} y={size*0.04} width={w-size*0.1} height={h-size*0.1}
        rx={rx*0.6} ry={rx*0.6} fill="none" stroke="#ddd" strokeWidth={sw*0.5}/>

      {/* 4色扇形（牌の中央） */}
      <path d={arc(-90,   0)} fill="#2d6e3e"/>  {/* 上: 緑 */}
      <path d={arc(  0,  90)} fill="#8b2020"/>  {/* 右: 赤 */}
      <path d={arc( 90, 180)} fill="#222"/>     {/* 下: 黒 */}
      <path d={arc(180, 270)} fill="#888"/>     {/* 左: グレー */}

      {/* 外周円 */}
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#111" strokeWidth={sw}/>
      {/* 内周円（棒グラフエリア・白塗り） */}
      <circle cx={cx} cy={cy} r={ri} fill="white" stroke="#111" strokeWidth={sw*0.8}/>

      {/* 棒グラフ（内周円内） */}
      {[
        {dx:-ri*0.48, h:ri*0.58},
        {dx:-ri*0.12, h:ri*0.78},
        {dx: ri*0.24, h:ri*1.0},
      ].map((b,i) => (
        <rect key={i}
          x={cx+b.dx} y={cy+ri*0.38-b.h}
          width={ri*0.28} height={b.h}
          rx={ri*0.06} fill="#111"/>
      ))}

      {/* 4方向の人物アイコン */}
      {person(cx,          cy - r - size*0.055)}
      {person(cx + r + size*0.055, cy)}
      {person(cx,          cy + r + size*0.055)}
      {person(cx - r - size*0.055, cy)}
    </svg>
  );
}

  const [password, setPassword] = useState("");

  );
}

// ===================== SETUP SCREEN =====================
function SetupScreen({ members, settings, onStart }) {
  const [sel, setSel] = useState(members.slice(0,4));
  const [oyaIdx, setOyaIdx] = useState(0);

  const toggle = (name) => {
    if (sel.includes(name)) {
      const ns = sel.filter(n => n !== name);
      setSel(ns);
      if (oyaIdx >= ns.length) setOyaIdx(0);
    } else {
      if (sel.length >= 4) return;
      setSel([...sel, name]);
    }
  };
  const moveUp = (i) => {
    if (i === 0) return;
    const ns = [...sel]; [ns[i-1],ns[i]] = [ns[i],ns[i-1]];
    setSel(ns);
    if (oyaIdx === i) setOyaIdx(i-1);
    else if (oyaIdx === i-1) setOyaIdx(i);
  };
  const moveDown = (i) => {
    if (i === sel.length-1) return;
    const ns = [...sel]; [ns[i],ns[i+1]] = [ns[i+1],ns[i]];
    setSel(ns);
    if (oyaIdx === i) setOyaIdx(i+1);
    else if (oyaIdx === i+1) setOyaIdx(i);
  };

  return (
    <div className="scr fade">
      <AppTopBar title="対局"/>

      <div className="card">
        <div className="chd">メンバー選択（4人）<span style={{fontSize:11,color:"var(--tx3)"}}>{sel.length}/4</span></div>
        <div style={{padding:"9px 11px",display:"flex",flexWrap:"wrap",gap:6}}>
          {members.map(name => (
            <button key={name} className={`mc${sel.includes(name)?" sel":""}`} onClick={() => toggle(name)}>
              <span style={{fontSize:13,fontWeight:700}}>{name}</span>
              {sel.includes(name) && <span style={{fontSize:11,color:"var(--ac)"}}>{sel.indexOf(name)+1}</span>}
            </button>
          ))}
        </div>
      </div>

      {sel.length > 0 && (
        <div className="card">
          <div className="chd">席順・東家<span style={{fontSize:10,color:"var(--tx3)"}}>↑↓並替え ／ 丸タップで東家</span></div>
          {sel.map((name, i) => {
            const wl = ["東","南","西","北"][(i - oyaIdx + 4) % 4];
            return (
              <div key={i} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 13px",
                borderBottom:i<sel.length-1?"1px solid var(--bd)":"none"}}>
                <div style={{display:"flex",flexDirection:"row",gap:4}}>
                  <button onClick={() => moveUp(i)} disabled={i===0}
                    style={{background:i===0?"var(--s2)":"var(--s3)",border:"1px solid var(--bd)",
                      borderRadius:6,cursor:i===0?"default":"pointer",
                      color:i===0?"var(--bd)":"var(--tx)",fontSize:14,
                      padding:"6px 12px",lineHeight:1,fontFamily:"inherit"}}>↑</button>
                  <button onClick={() => moveDown(i)} disabled={i===sel.length-1}
                    style={{background:i===sel.length-1?"var(--s2)":"var(--s3)",border:"1px solid var(--bd)",
                      borderRadius:6,cursor:i===sel.length-1?"default":"pointer",
                      color:i===sel.length-1?"var(--bd)":"var(--tx)",fontSize:14,
                      padding:"6px 12px",lineHeight:1,fontFamily:"inherit"}}>↓</button>
                </div>
                <button onClick={() => setOyaIdx(i)}
                  style={{width:30,height:30,borderRadius:"50%",border:"none",cursor:"pointer",fontFamily:"inherit",
                    background:i===oyaIdx?"var(--gold)":"var(--s3)",
                    color:i===oyaIdx?"#000":"var(--tx2)",fontWeight:900,fontSize:12,flexShrink:0}}>
                  {wl}
                </button>
                <span style={{flex:1,fontWeight:700,fontSize:14}}>{name}</span>
                {i===oyaIdx && <span style={{fontSize:10,color:"var(--gold)"}}>👑東家</span>}
              </div>
            );
          })}
        </div>
      )}

      <div className="card">
        <div className="chd">現在のルール</div>
        <div style={{padding:"9px 14px",display:"flex",flexWrap:"wrap",gap:6}}>
          {[
            settings.gameType==="tonpu"?"東風戦":"半荘戦",
            `持ち点${settings.startPoints/1000}k`,
            `返し${settings.returnPoints/1000}k`,
            `ウマ${settings.uma[0]}/${settings.uma[1]}`,
            settings.tobiEnd?"トビあり":"トビなし",
            settings.doubleRon?"ダブロンあり":"頭ハネ",
            settings.nyu?(settings.gameType==="tonpu"?"南入あり":"西入あり"):(settings.gameType==="tonpu"?"南入なし":"西入なし"),
            (settings.kiriage??true)?"繰り上げ満貫あり":"繰り上げ満貫なし",
            settings.yakitori?`焼き鳥${settings.yakitori}`:null,
            settings.tobiBonus?`トビ賞${settings.tobiBonus}`:null,
            settings.chonboRule==="3000all"?"チョンボ:3000オール":"チョンボ:満貫払い",
          ].filter(Boolean).map((t,i) => (
            <span key={i} style={{background:"var(--s2)",border:"1px solid var(--bd)",
              borderRadius:20,padding:"3px 9px",fontSize:11,color:"var(--tx2)"}}>{t}</span>
          ))}
        </div>
      </div>

      <button className="btn bp" disabled={sel.length!==4} onClick={() => onStart(sel, oyaIdx)}>
        ▶ 対局開始
      </button>
    </div>
  );
}

// 直近24時間の対戦結果バナー
function Recent24h({ games, players }) {
  const now = Date.now();
  const recent = games.filter(g => {
    const d = new Date(g.date);
    return !isNaN(d) && (now - d.getTime()) <= 24*3600*1000;
  });
  if (recent.length === 0) return null;

  // 各プレイヤーのスコア合計
  const scores = {};
  players.forEach(p => { scores[p] = 0; });
  recent.forEach(g => {
    const fp = g.players.map((_,i)=>g.rounds.reduce((s,r)=>s+(r.delta[i]??0),g.settings.startPoints));
    const fins = calcFinalScore(fp, g.settings, g.rounds);
    g.players.forEach((p,i) => { if (scores[p] !== undefined) scores[p] += fins[i]; });
  });

  return (
    <div style={{background:"var(--s2)",border:"1px solid var(--bd)",borderRadius:8,
      padding:"7px 10px",marginBottom:8,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
      <span style={{fontSize:10,color:"var(--tx3)",flexShrink:0}}>直近24h</span>
      {players.map(p => (
        <span key={p} style={{fontSize:11,fontWeight:700,
          color:scores[p]>0?"var(--plus)":scores[p]<0?"var(--minus)":"var(--tx3)"}}>
          {p} {scores[p]>=0?"+":""}{(Math.round(scores[p]*10)/10).toFixed(1)}
        </span>
      ))}
    </div>
  );
}


function GameScreen({ gameState, setGameState, onFinish }) {
  const [modal, setModal] = useState(null);
  const [selP, setSelP] = useState(null);
  const [selPs, setSelPs] = useState([]);
  const [winType, setWinType] = useState(null);
  const [ronTarget, setRonTarget] = useState(null);
  const [pending, setPending] = useState(null);

  const gs = gameState;
  const { currentRound: cr, points, players, settings } = gs;
  const rs = gs.roundStatus || players.map(() => null);
  const fuuroCount = gs.fuuroCount || players.map(() => 0);
  const riichiOrder = gs.riichiOrder || [];
  const totalRiichiCount = gs.totalRiichiCount || 0;
  const kyotakuPoints = gs.kyotakuPoints ?? 0;  // 場に出ている供託点数
  const wl = ["東","南","西","北"][cr.wind];
  // riは表示用（現在の供託本数、リーチ後も更新される）
  const ri = `${wl}${cr.round}局 ${cr.honba}本場 供託${cr.kyotaku}本`;
  const dealerStart = cr.dealerStart ?? 0;
  const totalRoundsPlayed = cr.wind * 4 + (cr.round - 1);
  const oyaIdx = (dealerStart + totalRoundsPlayed) % 4;
  const isOya = i => i === oyaIdx;

  // 今局のリーチ本数（points上で既に-1000済み）を供託から除外
  const thisRoundRiichiCount = rs.filter(s => s === "riichi").length;
  const prevKyotaku = Math.max(0, cr.kyotaku - thisRoundRiichiCount);

  const handleRiichi = (pIdx) => {
    const cur = rs[pIdx];
    if (cur === "fuuro") return;
    const ns = [...rs];
    if (cur === "riichi") {
      // キャンセル: 点数を戻す、供託を元に戻す
      ns[pIdx] = null;
      const np = [...points]; np[pIdx] += 1000;
      const newOrder = riichiOrder.filter(o => o.pIdx !== pIdx);
      setGameState({ ...gs,
        roundStatus: ns, points: np,
        kyotakuPoints: kyotakuPoints - 1000,
        riichiOrder: newOrder,
        totalRiichiCount: Math.max(0, totalRiichiCount - 1),
        currentRound: { ...cr, kyotaku: Math.max(0, cr.kyotaku-1) }
      });
    } else {
      playRiichiSound();
      ns[pIdx] = "riichi";
      const np = [...points]; np[pIdx] -= 1000;
      const orderInRound = riichiOrder.length + 1;
      const newOrder = [...riichiOrder, { pIdx, orderInRound }];
      setGameState({ ...gs,
        roundStatus: ns, points: np,
        kyotakuPoints: kyotakuPoints + 1000,
        riichiOrder: newOrder,
        totalRiichiCount: totalRiichiCount + 1,
        currentRound: { ...cr, kyotaku: cr.kyotaku+1 }
      });
    }
  };

  const handleFuuro = (pIdx) => {
    const cur = rs[pIdx];
    if (cur === "riichi") return;
    const ns = [...rs];
    const nfc = [...fuuroCount];
    if (cur === "fuuro") {
      // タップするたびに回数が増える（最大4）、4を超えたらリセット
      if (nfc[pIdx] >= 4) {
        ns[pIdx] = null;
        nfc[pIdx] = 0;
      } else {
        nfc[pIdx] += 1;
        playFuuroSound();
      }
    } else {
      // 初回タップ: fuuro状態にして1副露
      playFuuroSound();
      ns[pIdx] = "fuuro";
      nfc[pIdx] = 1;
    }
    setGameState({ ...gs, roundStatus: ns, fuuroCount: nfc });
  };

  const applyResult = (delta, info, rewindTo = null) => {
    const baseRounds = rewindTo !== null ? gs.rounds.slice(0, rewindTo) : gs.rounds;

    // basePointsは常にstartPointsからroundsのdeltaを積み上げて計算
    // （gs.pointsはリーチで引かれた状態のため使わない）
    const startPoints = players.map(() => settings.startPoints);
    const basePoints = baseRounds.reduce(
      (acc, r) => acc.map((v, i) => v + (r.delta[i] ?? 0)),
      startPoints
    );

    // 今局のリーチ棒分（各プレイヤーがリーチで出した-1000）をdeltaに組み込む
    // リーチ者はこの局で-1000を払っているので、それをdeltaに反映する
    const riichiDelta = players.map((_, i) => rs[i] === "riichi" ? -1000 : 0);

    // 供託の処理
    const correctedDelta = delta.map((d, i) => d + riichiDelta[i]);
    let newKyotakuPoints = kyotakuPoints;

    if (info.type === "tsumo" || info.type === "ron") {
      // 和了者を特定（deltaがプラスの人）
      const winnerIdx = delta.findIndex((d, i) => d > 0);
      if (winnerIdx >= 0) {
        correctedDelta[winnerIdx] += kyotakuPoints;
        newKyotakuPoints = 0;
      }
    } else if (info.nagashi) {
      // 流し満貫: 和了者（deltaが最大の人）に供託を渡す
      const winnerIdx = delta.reduce((mi,v,i)=>v>delta[mi]?i:mi, 0);
      correctedDelta[winnerIdx] += kyotakuPoints;
      newKyotakuPoints = 0;
    }
    // 流局・チョンボ時は供託持ち越し（kyotakuPointsはそのまま）

    const newPoints = basePoints.map((p, i) => p + (correctedDelta[i] ?? 0));

    // roundLabelは局開始時の供託本数を記録する（リーチ前の本数）
    // cr.kyotakuは局開始時の本数、今局のリーチは含まない
    const preRiichiKyotaku = cr.kyotaku - rs.filter(s => s === "riichi").length;
    const roundLabel = `${wl}${cr.round}局 ${cr.honba}本場 供託${Math.max(0,preRiichiKyotaku)}本`;

    const newRound = {
      delta: correctedDelta, info, roundLabel,
      roundStatus: [...rs],
      riichiOrder: [...riichiOrder],
      fuuroCount: [...fuuroCount],
    };
    const updatedGs = {
      ...gs, points: newPoints, rounds: [...baseRounds, newRound],
      roundStatus: players.map(() => null),
      fuuroCount: players.map(() => 0),
      riichiOrder: [],
      kyotakuPoints: newKyotakuPoints,
    };

    let nr = { ...cr };
    const thisRoundRiichiCount = rs.filter(s => s === "riichi").length;
    // 次の局の供託本数
    // 和了: 全て和了者へ渡るので0
    // 流局: 今局のリーチ棒も含めて持ち越し（cr.kyotakuはリーチ棒込みの本数）
    // renchon(連荘): 本場+1、供託はそのまま持ち越し
    if (info.renchon) {
      nr.honba += 1;
      // 供託はそのまま（kyotakuは変えない）
    } else {
      nr.honba = info.ryukyoku ? nr.honba + 1 : 0;
      if (info.ryukyoku) {
        // 流局: 今局のリーチ棒も加えた本数を持ち越し
        nr.kyotaku = cr.kyotaku; // cr.kyotakuは既にリーチ棒込み
      } else {
        // 和了・チョンボ: 供託は0
        nr.kyotaku = 0;
      }
      if (!info.ryukyoku || !info.oyaTenpai) {
        nr.round += 1;
        if (nr.round > 4) { nr.round = 1; nr.wind += 1; }
      }
    }
    updatedGs.currentRound = nr;

    // ── 終局判定 ──
    // wind: 0=東, 1=南, 2=西, 3=北
    // cr = 今終わった局, nr = 次の局（renchonなら同じ局の本場++）
    const baseMaxWind = settings.gameType === "tonpu" ? 0 : 1;

    // 「今終わった局」がオーラスかどうか
    const wasLastRound = cr.wind === baseMaxWind && cr.round === 4;

    let roundOver = false;

    if (wasLastRound) {
      if (!settings.nyu) {
        // 南入/西入なし → オーラス終了で無条件終局
        // ただし連荘（renchon）の場合は続行
        roundOver = !info.renchon;
      } else {
        // 南入/西入あり → トップが返し点以上なら終局（連荘でも終局）
        const topScore = Math.max(...newPoints);
        if (topScore >= settings.returnPoints) {
          roundOver = true;
        }
        // トップが返し点未満かつ連荘 → 続行（延長ラウンドへ）
        // トップが返し点未満かつ非連荘 → 延長ラウンドへ進む（続行）
      }
    } else if (nr.wind > baseMaxWind + (settings.nyu ? 1 : 0)) {
      // 延長限界を超えた → 無条件終局
      roundOver = true;
    }

    const tobi = settings.tobiEnd && newPoints.some(p => p < 0);
    const shouldEnd = roundOver || tobi;

    if (shouldEnd) {
      // 終局時: 点数合計が初期点数の総和と一致するようトップに調整
      const totalStart = players.length * settings.startPoints;
      const finalPoints = [...newPoints];
      const finalRounds = [...updatedGs.rounds];
      const currentSum = finalPoints.reduce(function(s,v){return s+v;}, 0);
      const diff = totalStart - currentSum; // 供託残りなどのズレ
      if (diff !== 0) {
        const topIdx = finalPoints.reduce(function(mi,v,i){return v>finalPoints[mi]?i:mi;}, 0);
        finalPoints[topIdx] += diff;
        if (finalRounds.length > 0) {
          const lastRound = Object.assign({}, finalRounds[finalRounds.length-1]);
          const newDelta = lastRound.delta.slice();
          newDelta[topIdx] = (newDelta[topIdx]||0) + diff;
          lastRound.delta = newDelta;
          finalRounds[finalRounds.length-1] = lastRound;
        }
      }
      const finalGs = Object.assign({}, updatedGs, {points:finalPoints, rounds:finalRounds, kyotakuPoints:0});
      const isAgariYame = wasLastRound && info.renchon && !info.ryukyoku;
      setPending({ gs: finalGs, agariYame: isAgariYame });
      setModal("end_confirm");
    } else { setGameState(updatedGs); setModal(null); }
  };

  const handleEditRound = (roundIdx) => {
    const revRounds = gs.rounds.slice(0, roundIdx);
    const revPoints = revRounds.reduce(
      (acc, r) => acc.map((v, i) => v + (r.delta[i] ?? 0)),
      players.map(() => settings.startPoints)
    );
    // 修正する局のroundLabelから局情報を復元
    const targetLabel = gs.rounds[roundIdx]?.roundLabel ?? "";
    const windMap = {"東":0,"南":1,"西":2,"北":3};
    const match = targetLabel.match(/([東南西北])(\d+)局\s*(\d+)本場\s*供託(\d+)本/);
    // 修正前の供託点数を計算（その局までのリーチ棒合計）
    const revKyotaku = revRounds.reduce((s, r) => {
      if (r.info?.type) return 0; // 和了後は0
      if (r.info?.ryukyoku) return s + (r.roundStatus?.filter(x=>x==="riichi").length ?? 0);
      return s;
    }, 0) * 1000;

    let restoredRound;
    if (match) {
      restoredRound = {
        wind: windMap[match[1]] ?? 0,
        round: parseInt(match[2]),
        honba: parseInt(match[3]),
        kyotaku: parseInt(match[4]),
        dealerStart: gs.currentRound.dealerStart ?? 0, // dealerStartを引き継ぐ
      };
    } else {
      const w = Math.floor(roundIdx / 4), r2 = (roundIdx % 4) + 1;
      restoredRound = { wind:w, round:r2, honba:0, kyotaku:0, dealerStart: gs.currentRound.dealerStart ?? 0 };
    }

    setGameState({ ...gs, rounds: revRounds, points: revPoints,
      roundStatus: players.map(() => null),
      fuuroCount: players.map(() => 0),
      riichiOrder: [],
      kyotakuPoints: revKyotaku,
      currentRound: restoredRound });
  };

  return (
    <div className="scr fade" style={{padding:"0 10px 20px", display:"flex", flexDirection:"column", alignItems:"center"}}>
      <AppTopBar/>
      {/* 直近24時間の対戦結果 */}
      <Recent24h games={gs.allGames||[]} players={players}/>
      {/* 現在の局名（卓の上） */}
      <div style={{textAlign:"center",fontSize:13,fontWeight:700,color:"var(--tx2)",margin:"6px 0 5px",width:"100%"}}>{ri}</div>
      <div className="tw">
        <div className="tbg">
          {/* SVG麻雀卓 - 参考画像に忠実に再現 */}
          <svg className="tbl-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
              {/* フェルトテクスチャ：色を変えないようにcolorMatrixで制御 */}
              <filter id="felt-tex" x="0%" y="0%" width="100%" height="100%">
                <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" seed="8" result="noise"/>
                <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
                <feBlend in="SourceGraphic" in2="gray" mode="soft-light" result="blend"/>
                <feComponentTransfer in="blend">
                  <feFuncR type="linear" slope="1"/>
                  <feFuncG type="linear" slope="1"/>
                  <feFuncB type="linear" slope="1"/>
                  <feFuncA type="linear" slope="1"/>
                </feComponentTransfer>
              </filter>
              <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="4" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <radialGradient id="felt-grad" cx="50%" cy="50%" r="55%">
                <stop offset="0%" stopColor="#3a9488"/>
                <stop offset="50%" stopColor="#2d7a70"/>
                <stop offset="100%" stopColor="#1e5a52"/>
              </radialGradient>
              {/* 黒プラスチック光沢 */}
              <linearGradient id="plastic-top" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stopColor="#484848"/>
                <stop offset="8%" stopColor="#1c1c1c"/>
                <stop offset="100%" stopColor="#080808"/>
              </linearGradient>
              <radialGradient id="plastic-sheen" cx="50%" cy="12%" r="55%">
                <stop offset="0%" stopColor="rgba(255,255,255,0.11)"/>
                <stop offset="100%" stopColor="rgba(255,255,255,0)"/>
              </radialGradient>
              <linearGradient id="center-metal" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stopColor="#1a2530"/>

                <stop offset="100%" stopColor="#151e28"/>

              fill="rgba(0,0,0,0.5)" filter="url(#glow)"/>

      )}

      {modal==="kyushu" && (
        <Modal title="九種九牌など" onClose={()=>setModal("special_ryukyoku")}>

            全員±0・連荘・本場+1・供託持ち越し
          </p>
          <button className="mo" onClick={()=>{
            const delta = players.map(()=>0);
            applyResult(delta, {kyushu:true, renchon:true});
          }}>確定</button>
          <button className="mo moc" onClick={()=>setModal("special_ryukyoku")}>戻る</button>
        </Modal>
      )}

      {modal==="nagashi" && (
        <NagashiModal players={players} oyaIdx={oyaIdx} settings={settings}
          honba={cr.honba} roundStatus={rs}
          onConfirm={(delta, isOyaTenpai)=>{
            applyResult(delta, {nagashi:true, renchon:isOyaTenpai});
          }}
          onClose={()=>setModal("special_ryukyoku")}/>
      )}

      {modal==="early_exit" && (
        <Modal title="途中終了" onClose={()=>setModal("round_menu")}>
          <p style={{fontSize:13,color:"var(--tx2)",marginBottom:12,textAlign:"center"}}>

          <button className="mo moc" onClick={()=>setModal("round_menu")}>キャンセル</button>
        </Modal>
      )}
      {modal==="wts" && (
        <Modal title="和了者を選択" onClose={()=>setModal("round_menu")}>
          {players.map((p,i)=><button key={i} className="mo" onClick={()=>{setSelP(i);setModal("wt");}}>{p}（{isOya(i)?"親":"子"}）</button>)}
          <button className="mo moc" onClick={()=>setModal("round_menu")}>キャンセル</button>
        </Modal>
      )}
      {modal==="wt" && selP!==null && (
        <Modal title={`${players[selP]} の和了`} onClose={()=>setModal(null)}>
          <button className="mo" onClick={()=>{setWinType("tsumo");setModal("wi");}}>ツモ</button>
          <button className="mo" onClick={()=>{setWinType("ron");setModal("rt");}}>ロン</button>
          <button className="mo moc" onClick={()=>setModal(null)}>キャンセル</button>
        </Modal>
      )}
      {modal==="rt" && (
        <Modal title="放銃者を選択" onClose={()=>setModal("wt")}>
          {players.map((p,i)=>i===selP?null:<button key={i} className="mo" onClick={()=>{setRonTarget(i);setModal("wi");}}>{p}</button>)}
          <button className="mo moc" onClick={()=>setModal("wt")}>戻る</button>
        </Modal>
      )}
      {modal==="wi" && selP!==null && (
        <WinInputModal players={players} selP={selP} winType={winType} ronTarget={ronTarget}
          isOya={isOya(selP)} oyaIdx={oyaIdx} playerStatus={rs[selP]}
          honba={cr.honba} kyotaku={0} settings={settings}
          riichiOrderInRound={riichiOrder.find(o=>o.pIdx===selP)?.orderInRound ?? null}
          onConfirm={(d,info)=>applyResult(d,{...info,renchon:selP===oyaIdx})}
          onBack={()=>setModal(winType==="ron"?"rt":"wt")}/>
      )}
      {modal==="dr_sel" && (
        <Modal title="和了者（複数可）" onClose={()=>setModal("round_menu")}>
          {players.map((p,i)=>{const c=selPs.includes(i);return(
            <button key={i} className="mo" style={c?{background:"var(--ac)",color:"#fff"}:{}}
              onClick={()=>setSelPs(prev=>prev.includes(i)?prev.filter(x=>x!==i):[...prev,i])}>
              {c?"✓ ":""}{p}（{isOya(i)?"親":"子"}）
            </button>
          );})}
          <div style={{height:5}}/>
          {selPs.length===1&&<button className="btn bp" style={{marginBottom:7}} onClick={()=>{setSelP(selPs[0]);setModal("wt");}}>次へ（通常）</button>}
          {selPs.length>=2&&<button className="btn bp" style={{marginBottom:7}} onClick={()=>setModal("dr_rt")}>次へ（ダブロン {selPs.length}人）</button>}
          <button className="mo moc" onClick={()=>setModal("round_menu")}>キャンセル</button>
        </Modal>
      )}
      {modal==="dr_rt" && (
        <Modal title="放銃者を選択" onClose={()=>setModal("dr_sel")}>
          {players.map((p,i)=>selPs.includes(i)?null:<button key={i} className="mo" onClick={()=>{setRonTarget(i);setModal("dr_in");}}>{p}</button>)}
          <button className="mo moc" onClick={()=>setModal("dr_sel")}>戻る</button>
        </Modal>
      )}
      {modal==="dr_in" && (
        <DoubleRonModal players={players} winners={selPs} ronTarget={ronTarget} oyaIdx={oyaIdx}
          roundStatus={rs} honba={cr.honba} kyotaku={0}
          onConfirm={(d,info)=>applyResult(d,{...info,renchon:selPs.some(w=>isOya(w))})}
          onBack={()=>setModal("dr_rt")}/>
      )}
      {modal==="ryukyoku" && (
        <RyukyokuModal players={players} oyaIdx={oyaIdx} settings={settings} honba={cr.honba}
          roundStatus={rs}
          onConfirm={(d,ot)=>applyResult(d,{ryukyoku:true,oyaTenpai:ot})} onClose={()=>setModal(null)}/>
      )}
      {modal==="chonbo" && (
        <Modal title="チョンボ" onClose={()=>setModal("round_menu")}>
          <p style={{fontSize:12,color:"var(--tx2)",marginBottom:9,textAlign:"center"}}>チョンボした人を選択</p>
          {players.map((p,i)=>(
            <button key={i} className="mo" onClick={()=>{
              const wasR = rs[i]==="riichi";
              const chonboRule = settings.chonboRule ?? "mangan";
              let delta;
              if (chonboRule === "3000all") {
                delta = players.map((_,j)=>j===i ? -9000+(wasR?1000:0) : 3000);
              } else {
                delta = players.map((_,j)=>{
                  if (j===i) return (isOya(i)?-12000:-8000)+(wasR?1000:0);
                  return isOya(i)?4000:(j===oyaIdx?4000:2000);
                });
              }
              applyResult(delta, {chonbo:true, renchon:true});
            }}>{p}</button>
          ))}
          <button className="mo moc" onClick={()=>setModal("round_menu")}>キャンセル</button>
        </Modal>
      )}
      {modal==="end_confirm" && pending && (
        <Modal title="対局終了" onClose={()=>{}}>
          {/* スコアプレビュー */}
          <div style={{marginBottom:13}}>
            {(function(){
              var fp = pending.gs.players.map(function(_,i){
                return pending.gs.rounds.reduce(function(s,r){return s+(r.delta[i]||0);}, settings.startPoints);
              });
              var fins = calcFinalScore(fp, pending.gs.settings, pending.gs.rounds);
              var ranked = fins.map(function(v,i){return{v:v,i:i};}).sort(function(a,b){return b.v-a.v;});
              return ranked.map(function(x,rank){
                return(
                  <div key={x.i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 4px",
                    borderBottom:rank<ranked.length-1?"1px solid var(--bd)":"none"}}>
                    <div style={{width:20,height:20,borderRadius:10,display:"flex",alignItems:"center",
                      justifyContent:"center",fontSize:11,fontWeight:900,flexShrink:0,
                      background:["#f0c040","#b0b8c0","#c07840","var(--s3)"][rank],
                      color:rank<3?"#000":"var(--tx2)"}}>{rank+1}</div>
                    <div style={{flex:1,fontSize:13,fontWeight:700}}>{pending.gs.players[x.i]}</div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:15,fontWeight:900,color:x.v>=0?"var(--plus)":"var(--minus)"}}>{x.v>=0?"+":""}{x.v}</div>
                      <div style={{fontSize:10,color:"var(--tx3)"}}>{fp[x.i].toLocaleString()}点</div>
                    </div>
                  </div>
                );
              });
            })()}
          </div>
          {pending.agariYame ? (
            <>
              <p style={{fontSize:12,color:"var(--tx2)",marginBottom:10,textAlign:"center"}}>
                親があがりました。あがりやめにしますか？
              </p>
              <button className="mo" style={{color:"var(--minus)"}} onClick={()=>{onFinish(pending.gs);setModal(null);}}>確定して終了</button>
              <button className="mo" onClick={()=>{setGameState(pending.gs);setModal(null);}}>続行する</button>
            </>
          ) : (
            <>
              <button className="mo" style={{color:"var(--minus)"}} onClick={()=>{onFinish(pending.gs);setModal(null);}}>確定して終了</button>
              <button className="mo" onClick={()=>{setGameState(pending.gs);setModal(null);}}>戻る（延長）</button>
            </>
          )}
        </Modal>
      )}
    </div>
  );
}

function DoraCounter({ label, count, onInc, onReset, color }) {
  return (
    <div className="dr">
      <span style={{fontSize:12,flex:1}}>{label}</span>
      <button onClick={onReset} style={{background:"none",border:"none",color:"var(--tx3)",fontSize:11,cursor:"pointer",padding:"0 5px"}}>リセット</button>

        style={{borderColor:count>0?color:"var(--bd)",background:count>0?color:"var(--s3)",color:count>0?"#fff":"var(--tx2)"}}>

function WinInputModal({ players, selP, winType, ronTarget, isOya, oyaIdx, playerStatus, honba, kyotaku, settings, riichiOrderInRound, onConfirm, onBack }) {
  const isFu = playerStatus === "fuuro";
  const isRi = playerStatus === "riichi";
  const kiriage = settings?.kiriage ?? true;

  // デフォルト符: 副露→30、面前ツモ→30、面前ロン→40
  const defaultFuVal = isFu ? 30 : (winType === "tsumo" ? 30 : 40);

  const defaultYaku = () => {
    if (isRi && winType === "tsumo") return ["riichi", "menzen_tsumo"];
    if (isRi) return ["riichi"];
    if (!isFu && winType === "tsumo") return ["menzen_tsumo"];
    return [];
  };
  const [selY, setSelY] = useState(defaultYaku);
  const [fu, setFu] = useState(defaultFuVal);
  const [dora, setDora] = useState(0);
  const [aka, setAka] = useState(0);
  const [ura, setUra] = useState(0);
  const [yakuPai, setYakuPai] = useState(0);

  // 七対子=25符固定、平和ツモ=20符固定（stateではなく都度計算）
  const hasChiitoitsu = selY.includes("chiitoitsu");
  const hasPinfuTsumo = selY.includes("pinfu") && winType === "tsumo";
  const fuIsFixed = hasChiitoitsu || hasPinfuTsumo;
  // 固定符は選択状態から直接導出（state依存なし）
  const effectiveFu = fuIsFixed
    ? (hasChiitoitsu ? 25 : 20)
    : fu;

  // 20符・25符は七対子/平和ツモ以外では選択不可
  const visibleFuList = FU_LIST.filter(f => f >= 30);

  const visible = YAKU.filter(y => {
    if (isFu) return y.mode === "both" && y.hanF !== null;
    if (winType === "ron" && y.tsumoOnly) return false;
    if (winType === "tsumo" && y.ronOnly) return false;
    if (!isRi && (y.key === "riichi" || y.key === "ippatsu")) return false;
    return true;
  });

  const toggle = k => {
    if (k === "riichi" && isRi) return;
    setSelY(p => p.includes(k) ? p.filter(x=>x!==k) : [...p,k]);
  };

  const yakuHan = selY.reduce((s,k)=>{
    const y=YAKU.find(y=>y.key===k);
    return s+(y?(isFu?(y.hanF??0):y.han):0);
  },0)+yakuPai;
  const doraHan = dora + aka + (isRi ? ura : 0);
  const totalHan = yakuHan + doraHan;
  const hasYM = selY.some(k=>YAKU.find(y=>y.key===k)?.yakuman);
  const canOk = (selY.length>0||yakuPai>0) && totalHan>0;

  const previewStr = () => {
    if (!canOk) return null;
    const han = hasYM ? 13 : totalHan;
    if (winType==="tsumo") return tsumoPreview(han, effectiveFu, isOya, kiriage);
    const p = getRonPts(han, effectiveFu, isOya, kiriage);
    return p ? `${p.toLocaleString()}点` : "－";
  };

  const handleOk = () => {
    const han = hasYM ? 13 : totalHan;
    // 役なし点数計算（一発・裏ドラのみ除外、特殊役は含める）
    // honba・供託は除外（純粋な役とドラの点数のみ）
    const baseYaku = selY.filter(k => k !== "ippatsu");
    const baseYakuHan = baseYaku.reduce((s,k)=>{
      const y=YAKU.find(y=>y.key===k); return s+(y?(isFu?(y.hanF??0):y.han):0);
    },0)+yakuPai;
    const baseDoraHan = dora + aka; // 裏ドラ除く（表ドラ・赤ドラは含める）
    const baseTotalHan = baseYakuHan + baseDoraHan;

    // baseDelta: 役なし時（一発・裏ドラなし、honba/供託なし）の全員分delta
    const calcBaseDelta = () => {
      if (baseTotalHan <= 0) return players.map(()=>0);
      if (winType==="tsumo") {
        const bd = tsumoDeltas(baseTotalHan,effectiveFu,isOya,selP,oyaIdx,players.length,0,0,kiriage);
        return bd ? bd : players.map(()=>0);
      } else {
        const bp = getRonPts(baseTotalHan,effectiveFu,isOya,kiriage);
        if (!bp) return players.map(()=>0);
        return players.map((_,i)=>i===selP?bp:i===ronTarget?-bp:0);
      }
    };
    const baseDelta = calcBaseDelta();
    const baseScore = baseDelta[selP]; // 後方互換のため残す

    const extraInfo = {
      baseScore,
      baseDelta,                              // 全員分の役なし時delta（偶発恩恵計算用）
      riichiOrder: riichiOrderInRound,
      isFirstRiichi: riichiOrderInRound===1,
    };

    if (winType==="tsumo") {
      const d = tsumoDeltas(han, effectiveFu, isOya, selP, oyaIdx, players.length, honba, kyotaku, kiriage);
      if (!d) return;
      onConfirm(d, {type:"tsumo", han, fu:effectiveFu, yaku:selY, yakuPai, dora, aka, ura, ...extraInfo});
    } else {
      const p = getRonPts(han, effectiveFu, isOya, kiriage);
      if (!p) return;
      const total = p + honba*300 + kyotaku*1000;
      const d = players.map((_,i)=>i===selP?total:i===ronTarget?-(p+honba*300):0);
      onConfirm(d, {type:"ron", han, fu:effectiveFu, yaku:selY, yakuPai, dora, aka, ura, from:ronTarget, ...extraInfo});
    }
  };

  const pv = previewStr();

  return (
    <Modal title="和了入力" onClose={onBack}>
      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:11}}>
        <span style={{fontWeight:700}}>{players[selP]}</span>
        <span className={`chip ${winType==="tsumo"?"ct":"cr"}`}>{winType==="tsumo"?"ツモ":`ロン（${players[ronTarget]}）`}</span>
        {isFu&&<span style={{fontSize:11,color:"var(--fu)",fontWeight:700}}>副露</span>}
        {isRi&&<span style={{fontSize:11,color:"var(--ri)",fontWeight:700}}>リーチ</span>}
      </div>

      {YAKU_GROUPS.map(group => {
        const gy = visible.filter(y=>y.group===group);
        if (!gy.length) return null;
        return (
          <div key={group} style={{marginBottom:11}}>
            <div style={{fontSize:10,color:"var(--tx3)",marginBottom:4,fontWeight:700,letterSpacing:.5}}>{group}</div>
            <div className="yg">
              {gy.map(y=>{
                const active=selY.includes(y.key);
                const hv=isFu?y.hanF:y.han;
                return(
                  <button key={y.key} className={`yb${active?" sel":""}`} onClick={()=>toggle(y.key)}>
                    <span>{y.label}</span>
                    <span style={{fontSize:10,color:active?"var(--ac)":"var(--tx3)"}}>{y.yakuman?"役満":`${hv}翻`}</span>
                  </button>
                );
              })}
            </div>
            {group==="1翻役"&&(
              <div className="dr" style={{marginTop:5}}>
                <span style={{fontSize:12,flex:1}}>役牌（最大4）</span>
                <button onClick={()=>setYakuPai(0)} style={{background:"none",border:"none",color:"var(--tx3)",fontSize:11,cursor:"pointer",padding:"0 5px"}}>リセット</button>
                <button className="dt" onClick={()=>setYakuPai(c=>Math.min(4,c+1))}
                  style={{borderColor:yakuPai>0?"#e8a020":"var(--bd)",background:yakuPai>0?"#e8a020":"var(--s3)",color:yakuPai>0?"#000":"var(--tx2)"}}>
                  {yakuPai>0?`×${yakuPai}`:"0"}
                </button>
              </div>
            )}
          </div>
        );
      })}

      {/* 符数 */}
      {!hasYM && (
        <div style={{marginBottom:11}}>
          <div style={{fontSize:10,color:"var(--tx3)",marginBottom:4,fontWeight:700,letterSpacing:.5}}>
            符数{hasChiitoitsu?" (七対子: 25符固定)":hasPinfuTsumo?" (平和ツモ: 20符固定)":""}
          </div>
          {fuIsFixed ? (
            <div style={{fontSize:13,color:"var(--ac)",padding:"4px 0"}}>{effectiveFu}符（固定）</div>
          ) : (
            <div className="fw">{visibleFuList.map(f=><button key={f} className={`fb${effectiveFu===f?" sel":""}`} onClick={()=>setFu(f)}>{f}符</button>)}</div>
          )}
        </div>
      )}

      {/* ドラ */}
      <div style={{marginBottom:11}}>
        <div style={{fontSize:10,color:"var(--tx3)",marginBottom:4,fontWeight:700,letterSpacing:.5}}>ドラ（タップで枚数追加）</div>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          <DoraCounter label="表ドラ" count={dora} color="#f0a020" onInc={()=>setDora(c=>c+1)} onReset={()=>setDora(0)}/>
          <DoraCounter label="赤ドラ" count={aka} color="#ff4455" onInc={()=>setAka(c=>c+1)} onReset={()=>setAka(0)}/>
          {isRi&&<DoraCounter label="裏ドラ" count={ura} color="#9060e0" onInc={()=>setUra(c=>c+1)} onReset={()=>setUra(0)}/>}
        </div>
      </div>

      <div className="wf">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
          <div style={{fontSize:12,color:"var(--tx2)"}}>
            {hasYM?"役満":totalHan>0?`${yakuHan}翻${doraHan>0?`+ドラ${doraHan}`:""} ${effectiveFu}符`:"役を選んでください"}
          </div>
          {pv&&<div style={{fontSize:13,fontWeight:700,color:"var(--gold)"}}>{pv}</div>}
        </div>
        <button className="btn bp" disabled={!canOk} onClick={handleOk}>確定</button>
      </div>
    </Modal>
  );
}

// ===================== DOUBLE RON MODAL =====================
function DoubleRonModal({ players, winners, ronTarget, oyaIdx, roundStatus, honba, kyotaku, onConfirm, onBack }) {
  const sorted = [...winners].sort((a,b)=>((ronTarget-a+players.length)%players.length)-((ronTarget-b+players.length)%players.length));
  const [step, setStep] = useState(0);
  const [collected, setCollected] = useState([]);
  const cur = sorted[step];
  const isOya = cur === oyaIdx;
  const st = roundStatus?.[cur] ?? null;
  const isFu = st==="fuuro", isRi = st==="riichi";

  const [selY, setSelY] = useState(isRi?["riichi"]:[]);
  const [fu, setFu] = useState(isFu?30:40);
  const [dora, setDora] = useState(0), [aka, setAka] = useState(0), [ura, setUra] = useState(0);
  const [yakuPai, setYakuPai] = useState(0);

  useEffect(()=>{
    const s=roundStatus?.[sorted[step]]??null;
    setSelY(s==="riichi"?["riichi"]:[]);
    setFu(s==="fuuro"?30:40);
    setDora(0);setAka(0);setUra(0);setYakuPai(0);
  },[step]);

  const visible=YAKU.filter(y=>isFu?(y.mode==="both"&&y.hanF!==null):true);
  const yakuHan=selY.reduce((s,k)=>{const y=YAKU.find(y=>y.key===k);return s+(y?(isFu?(y.hanF??0):y.han):0);},0)+yakuPai;
  const doraHan=dora+aka+(!isFu?ura:0);
  const totalHan=yakuHan+doraHan;
  const hasYM=selY.some(k=>YAKU.find(y=>y.key===k)?.yakuman);
  const canOk=(selY.length>0||yakuPai>0)&&totalHan>0;

  const pvPts=()=>{
    if(!canOk) return null;
    const han=hasYM?13:totalHan;
    const p=getRonPts(han,fu,isOya);
    return p?`${p.toLocaleString()}点`:"－";
  };

  const submitOne=()=>{
    const han=hasYM?13:totalHan;
    const pts=getRonPts(han,fu,isOya)??0;
    const next=[...collected,{playerIdx:cur,pts}];
    if(step+1<sorted.length){setCollected(next);setStep(step+1);}
    else{
      const totalPay=next.reduce((s,w)=>s+w.pts,0)+honba*300*3;
      const delta=players.map((_,i)=>{
        if(i===ronTarget) return -totalPay;
        const w=next.find(x=>x.playerIdx===i);
        if(w) return w.pts+(i===sorted[0]?kyotaku*1000:0);
        return 0;
      });
      onConfirm(delta,{type:"ron",doubleRon:true,winners:next.map(x=>x.playerIdx),from:ronTarget});
    }
  };

  return(
    <Modal title={`ダブロン (${step+1}/${sorted.length})`} onClose={onBack}>
      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:9}}>
        <span style={{fontWeight:700}}>{players[cur]}</span>
        <span className="chip cr">ロン（{players[ronTarget]}）</span>
        {isFu&&<span style={{fontSize:11,color:"var(--fu)",fontWeight:700}}>副露</span>}

// ===================== RYUKYOKU MODAL =====================
function RyukyokuModal({ players, oyaIdx, settings, honba, roundStatus, onConfirm, onClose }) {
  // リーチ状態のプレイヤーは自動的に聴牌
  const [tp, setTp] = useState(players.map((_,i) => roundStatus?.[i] === "riichi"));

  const calcDelta = (tenpaiArr) => {
    const tc = tenpaiArr.filter(Boolean).length;
    const pen = settings.notenPenalty; // 通常3000
    // 正しい配分表:
    // 0人 or 4人 → ±0
    // 1人聴牌 → +3000, -1000×3
    // 2人聴牌 → +1500×2, -1500×2
    // 3人聴牌 → +1000×3, -3000×1
    if (tc === 0 || tc === 4) return players.map(() => 0);
    const nc = 4 - tc;
    const tenpaiGet = pen / tc;   // 聴牌者1人が受け取る額
    const notenPay  = pen / nc;   // 不聴者1人が払う額
    return players.map((_, i) => tp[i] ? tenpaiGet : -notenPay);
  };

  const delta = calcDelta(tp);
  const tc = tp.filter(Boolean).length;

  const confirm = () => { onConfirm(calcDelta(tp), tp[oyaIdx]); };

  return(
    <Modal title="流局" onClose={onClose}>
      <p style={{fontSize:12,color:"var(--tx2)",marginBottom:9}}>聴牌者を選択（リーチ者は自動選択）</p>
      <div className="tg">
        {players.map((p,i)=>{
          const isRiichi = roundStatus?.[i] === "riichi";
          return(
            <button key={i}
              className={`tb${tp[i]?" on":" off"}`}
              style={isRiichi?{borderColor:"var(--ri)",opacity:1}:{}}
              onClick={()=>{
                if(isRiichi) return; // リーチ者は変更不可
                const t=[...tp]; t[i]=!t[i]; setTp(t);
              }}>
              {p}{isRiichi?" 🀄":""}<br/>
              <span style={{fontSize:11}}>{tp[i]?"聴牌":"不聴"}</span>
            </button>
          );
        })}
      </div>
      {/* 点数プレビュー */}
      {tc > 0 && tc < 4 && (
        <div style={{background:"var(--s2)",borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:12}}>
          {players.map((p,i)=>(
            <span key={i} style={{marginRight:12,color:delta[i]>0?"var(--plus)":delta[i]<0?"var(--minus)":"var(--tx3)"}}>
              {p} {delta[i]>0?"+":""}{delta[i].toLocaleString()}
            </span>
          ))}
        </div>
      )}
      <div style={{display:"flex",gap:7}}>
        <button className="btn bp" onClick={confirm}>確定</button>
        <button className="btn bg" style={{width:"auto",padding:"13px 18px"}} onClick={onClose}>戻る</button>
      </div>
    </Modal>
  );
}

// ===================== STATS SCREEN =====================
function StatsScreen({ games, onRefresh }) {
  const allP = [...new Set(games.flatMap(g=>g.players))];
  const [sel, setSel] = useState(allP[0]??null);
  const [period, setPeriod] = useState("all");
  const [customFrom, setCustomFrom] = useState("");
  const [customTo, setCustomTo] = useState("");

  useEffect(()=>{ if(allP.length>0&&!allP.includes(sel)) setSel(allP[0]); },[games]);

  if (games.length===0) return <div className="scr fade"><div className="empty">対局記録がありません</div></div>;

  const now = new Date();
  const filterGame = (g) => {
    if (period==="all") return true;
    const d = new Date(g.date); if(isNaN(d)) return true;
    if (period==="week")   return (now-d)<=7*24*3600*1000;
    if (period==="month")  return (now-d)<=30*24*3600*1000;
    if (period==="3month") return (now-d)<=90*24*3600*1000;
    if (period==="custom") {
      const from=customFrom?new Date(customFrom):null;
      const to=customTo?new Date(customTo+"T23:59:59"):null;
      if(from&&d<from) return false;
      if(to&&d>to) return false;
    }
    return true;
  };

  const filteredGames = games.filter(filterGame);
  const allStats = {};
  allP.forEach(p => {
    const pg2 = filteredGames.filter(g=>g.players.includes(p));
    if(pg2.length>0) {
      const s = calcStats(p, pg2);
      s.totalScore = pg2.reduce((sum,g)=>{
        const pi=g.players.indexOf(p); if(pi<0) return sum;
        const fp=g.players.map((_,i)=>g.rounds.reduce((acc,r)=>acc+(r.delta[i]??0),g.settings.startPoints));
        return sum+calcFinalScore(fp,g.settings,g.rounds)[pi];
      }, 0);
      allStats[p] = s;
    }
  });

  const pg = filteredGames.filter(g=>g.players.includes(sel));
  const st = allStats[sel];
  // 総ポイントはここで計算
  const totalScorePts = pg.reduce((sum,g)=>{
    const pi=g.players.indexOf(sel); if(pi<0) return sum;
    const fp=g.players.map((_,i)=>g.rounds.reduce((s,r)=>s+(r.delta[i]??0),g.settings.startPoints));
    const fins=calcFinalScore(fp,g.settings,g.rounds);
    return sum+fins[pi];
  }, 0);

  const medal = (key, higherIsBetter=true) => {
    const vals = allP.map(p=>({p,v:allStats[p]?.[key]??null})).filter(x=>x.v!==null&&isFinite(x.v));
    vals.sort((a,b)=>higherIsBetter?b.v-a.v:a.v-b.v);
    const rank = vals.findIndex(x=>x.p===sel);
    return ["\u{1F947}","\u{1F948}","\u{1F949}"][rank]??"";

function calcStats(player, games) {
  const ranks=[0,0,0,0]; let tobi=0;
  const allR=[];
  let totalFinalPts=0, totalStartPts=0;
  let totalScorePts=0; // ポイント合計
  let totalGames=0, tonpuCount=0, hanchanCount=0;

  games.forEach(g=>{
    const pi=g.players.indexOf(player); if(pi<0) return;
    const fp=g.players.map((_,i)=>g.rounds.reduce((s,r)=>s+(r.delta[i]??0),g.settings.startPoints));
    const fins=calcFinalScore(fp,g.settings,g.rounds);
    const rank=[...fins.map((v,i)=>({v,i}))].sort((a,b)=>b.v-a.v).findIndex(x=>x.i===pi)+1;
    ranks[rank-1]++;
    if(fp[pi]<0) tobi++;
    totalFinalPts+=fp[pi];
    totalStartPts+=g.settings.startPoints;
    totalScorePts+=fins[pi];
    totalGames++;
    if(g.settings.gameType==="tonpu") tonpuCount++; else hanchanCount++;
    g.rounds.forEach(r=>allR.push({r,pi,g}));
  });

  const n=games.length, tr=allR.length;
  const wins=allR.filter(({r,pi})=>r.delta[pi]>0&&r.info?.type);
  const deals=allR.filter(({r,pi})=>r.info?.from===pi);
  const rR=allR.filter(({r,pi})=>r.roundStatus?.[pi]==="riichi");
  const fR=allR.filter(({r,pi})=>r.roundStatus?.[pi]==="fuuro");
  const rW=wins.filter(({r,pi})=>r.roundStatus?.[pi]==="riichi");
  const fW=wins.filter(({r,pi})=>r.roundStatus?.[pi]==="fuuro");
  const mW=wins.filter(({r,pi})=>!r.roundStatus?.[pi]);
  const tW=wins.filter(({r})=>r.info?.type==="tsumo").length;
  const roW=wins.filter(({r})=>r.info?.type==="ron").length;

  // リーチ後放銃
  const rD=deals.filter(({r,pi})=>r.roundStatus?.[pi]==="riichi");
  // 一発
  const ippatsuW=wins.filter(({r,pi})=>r.info?.yaku?.includes("ippatsu"));
  // 裏ドラ
  const totalUra=rW.reduce((s,{r})=>s+(r.info?.ura??0),0);
  // 表ドラ・赤ドラ（全和了）
  const totalDora=wins.reduce((s,{r})=>s+(r.info?.dora??0),0);
  const totalAka=wins.reduce((s,{r})=>s+(r.info?.aka??0),0);
  // 先制リーチ（orderInRound===1）
  const firstRiichi=rR.filter(({r,pi})=>r.riichiOrder?.find(o=>o.pIdx===pi)?.orderInRound===1);

  // 副露回数別（1副露/2副露/3副露/4副露）
  const fuuroByCount=[0,0,0,0];
  fR.forEach(({r,pi})=>{
    const fc=(r.fuuroCount?.[pi]??1)-1;
    if(fc>=0&&fc<4) fuuroByCount[fc]++;
  });

  const avg=a=>a.length>0?a.reduce((s,{r,pi})=>s+r.delta[pi],0)/a.length:0;
  const avgDeal=deals.length>0?deals.reduce((s,{r,pi})=>s+Math.abs(r.delta[pi]),0)/deals.length:0;

  const horaRate=tr?wins.length/tr*100:0;
  const dealRate=tr?deals.length/tr*100:0;
  const avgWin=avg(wins);
  // 親・子別平均打点
  const oyaWins = wins.filter(function(x){ return x.r.info&&x.r.info.renchon!==undefined ? x.pi===oyaIdxOfRound(x.r,x.g) : false; });
  function oyaIdxOfRound(r,g) {
    var ds=g.currentRound&&g.currentRound.dealerStart?g.currentRound.dealerStart:0;
    var ri=g.rounds.indexOf(r);
    return ri>=0?(ds+ri)%4:-1;
  }
  // 実際は各局のoyaIdxをroundStatusから取得するのが正確
  // 簡易版: info.renchon===trueなら和了者が親
  const oyaWinsSimple = wins.filter(function(x){ return x.r.info&&x.r.info.renchon; });
  const koWinsSimple  = wins.filter(function(x){ return x.r.info&&!x.r.info.renchon&&x.r.info.type; });
  const scoringEff=avgWin*horaRate/100;
  const dealLoss=avgDeal*dealRate/100;
  const adjustedEff=scoringEff-dealLoss;
  // 局収支: (最終点数合計 - 初期点数×対局数) / 総局数
  const roundIncome = tr>0 ? (totalFinalPts - totalStartPts) / tr : 0;
  // 平均素点: 最終持ち点の平均
  const avgFinalPts = totalGames>0 ? totalFinalPts / totalGames : 0;

  // 偶発恩恵: 一発・裏ドラによる恩恵のみを抽出
  // delta = baseDelta + 本場分 + リーチ棒移動分 + 一発裏ドラ分
  // 偶発恩恵 = delta - baseDelta - 本場分 - リーチ棒移動分
  var luckyBonusTotal = 0;
  allR.forEach(function(x) {
    var r=x.r; var pi=x.pi;
    if (!r.info || !r.info.type) return;
    if (!r.info.baseDelta) {
      // 後方互換（古いデータ・baseDeltaなし）: 近似計算
      if (!r.info.baseScore) return;
      var actual0 = r.delta[pi];
      var winnerIdx0 = r.delta.findIndex(function(d){return d>0;});
      if (pi === winnerIdx0) {
        luckyBonusTotal += (actual0 - r.info.baseScore);
      } else if (r.info.type==="ron" && r.info.from===pi) {
        luckyBonusTotal += (actual0 - (-r.info.baseScore));
      }
      return;
    }

    var actual = r.delta[pi];
    var base = r.info.baseDelta[pi];
    var honba = r.info.honba || 0;
    var nP2 = r.delta.length;
    var winnerIdx = r.delta.findIndex(function(d){return d>0;});

    // リーチ棒移動分: riichiOrderから今局のリーチ本数を取得
    var riichiCount = r.riichiOrder ? r.riichiOrder.length : 0;
    var didRiichi = r.roundStatus && r.roundStatus[pi]==="riichi";

    // 本場分の計算: deltaに含まれている本場の影響を除去する
    // 和了者: baseDeltaより本場分多く受け取っている（プラス）
    // 放銃者/払い手: baseDeltaより本場分多く払っている（マイナス）
    var honbaDiff = 0;
    if (r.info.type==="ron") {
      if (pi===winnerIdx) honbaDiff = honba*300;       // 和了者は本場分多く受け取る
      else if (r.info.from===pi) honbaDiff = -(honba*300); // 放銃者は本場分多く払う
    } else {
      if (pi===winnerIdx) honbaDiff = honba*100*(nP2-1); // 和了者は全員から本場分受け取る
      else honbaDiff = -(honba*100);                      // 払い手は本場分多く払う
    }

    // リーチ棒移動分の計算
    // リーチした人: -1000（既にdeltaに含まれる）
    // 和了者: +riichiCount×1000（既にdeltaに含まれる）
    var riichiBobDiff = 0;
    if (didRiichi) riichiBobDiff = -1000;
    if (pi===winnerIdx) riichiBobDiff += riichiCount*1000;

    // 供託持ち越し分 = deltaSum - baseDeltaSum
    // 本場はゼロサム（和了者+, 払い手-）なのでdeltaSumに影響しない
    // 今局リーチ棒も払い（-）と受け取り（+）が相殺されdeltaSumに影響しない
    // よって deltaSum - baseDeltaSum = 前局以前からの持ち越し供託のみ
    var deltaSum3 = r.delta.reduce(function(s,v){return s+v;},0);
    var baseDeltaSum3 = r.info.baseDelta.reduce(function(s,v){return s+v;},0);
    var carryKyotaku = deltaSum3 - baseDeltaSum3;
    var carryKyotakuDiff = (pi===winnerIdx) ? carryKyotaku : 0;

    // 偶発恩恵 = (actual - base) - 本場分 - 今局リーチ棒 - 持ち越し供託分
    luckyBonusTotal += (actual - base) - honbaDiff - riichiBobDiff - carryKyotakuDiff;
  });
  const luckyBonus = tr > 0 ? luckyBonusTotal / tr : 0;

  // 迎撃和了率
  var counterWins=wins.filter(function(x){
    // 他の誰かが先制リーチ（orderInRound===1）している局
    var others=x.r.riichiOrder?x.r.riichiOrder.some(function(o){return o.pIdx!==x.pi&&o.orderInRound===1;}):false;
    // 自分が先制リーチ（1番手）でない（2番手以降のリーチや無リーチはOK）
    var selfOrder=x.r.riichiOrder?x.r.riichiOrder.find(function(o){return o.pIdx===x.pi;}):null;
    var notFirstRiichi=!selfOrder||selfOrder.orderInRound!==1;
    return others&&notFirstRiichi;
  });
  // 親継続率
  var oyaTotal=0,oyaContinue=0;
  games.forEach(function(g){
    var pi=g.players.indexOf(player);if(pi<0)return;
    var ds=g.currentRound&&g.currentRound.dealerStart?g.currentRound.dealerStart:0;
    g.rounds.forEach(function(r,ri){
      if((ds+ri)%4===pi){oyaTotal++;if(r.info&&(r.info.renchon||r.info.chonbo||r.info.kyushu))oyaContinue++;}
    });
  });
  // 流局時聴牌率
  var ryuR=allR.filter(function(x){return x.r.info&&x.r.info.ryukyoku;});
  var ryuT=ryuR.filter(function(x){return x.r.roundStatus&&x.r.roundStatus[x.pi]==="riichi";});
  // 親・子別流局聴牌
  var ryuROya=ryuR.filter(function(x){
    var ds=x.g.currentRound&&x.g.currentRound.dealerStart?x.g.currentRound.dealerStart:0;
    var ri=x.g.rounds.indexOf(x.r);
    return ri>=0&&(ds+ri)%4===x.pi;
  });
  var ryuRKo=ryuR.filter(function(x){ return ryuROya.indexOf(x)<0; });
  var ryuTOya=ryuROya.filter(function(x){return x.r.roundStatus&&x.r.roundStatus[x.pi]==="riichi";});
  var ryuTKo=ryuRKo.filter(function(x){return x.r.roundStatus&&x.r.roundStatus[x.pi]==="riichi";});
  // 役回数
  var yakuCounts={};
  wins.forEach(function(x){
    var yaku=x.r.info&&x.r.info.yaku?x.r.info.yaku:[];
    yaku.forEach(function(k){
      if(k==="riichi"||k==="daburi"){yakuCounts["riichi"]=(yakuCounts["riichi"]||0)+1;return;}
      yakuCounts[k]=(yakuCounts[k]||0)+1;
    });
    if(x.r.info&&x.r.info.yakuPai>0)yakuCounts["yakuhai"]=(yakuCounts["yakuhai"]||0)+1;
    if(x.r.info&&x.r.info.dora>0)yakuCounts["dora"]=(yakuCounts["dora"]||0)+x.r.info.dora;
    if(x.r.info&&x.r.info.aka>0)yakuCounts["aka"]=(yakuCounts["aka"]||0)+x.r.info.aka;
    if(x.r.info&&x.r.info.ura>0)yakuCounts["ura"]=(yakuCounts["ura"]||0)+x.r.info.ura;
    if(x.r.info&&x.r.info.type==="tsumo")yakuCounts["tsumo_count"]=(yakuCounts["tsumo_count"]||0)+1;
  });

  return{
    games:n, tr,
    avgRank:n>0?ranks.reduce((s,c,i)=>s+c*(i+1),0)/n:0,
    avgScore:n>0?totalScorePts/n:0,
    ranks, rentai:n>0?(ranks[0]+ranks[1])/n*100:0, tobi:n>0?tobi/n*100:0,
    counterWinRate:tr?counterWins.length/tr*100:0, counterWinsCount:counterWins.length,
    oyaContinueRate:oyaTotal?oyaContinue/oyaTotal*100:0, oyaTotal:oyaTotal, oyaContinue:oyaContinue,
    ryukyokuTenpaiRate:ryuR.length?ryuT.length/ryuR.length*100:0, ryukyokuCount:ryuR.length, ryukyokuTenpaiCount:ryuT.length,
    ryuOyaRate:ryuROya.length?ryuTOya.length/ryuROya.length*100:0, ryuOyaCount:ryuROya.length, ryuTOyaCount:ryuTOya.length,
    ryuKoRate:ryuRKo.length?ryuTKo.length/ryuRKo.length*100:0, ryuKoCount:ryuRKo.length, ryuTKoCount:ryuTKo.length,
    yakuCounts:yakuCounts,
    wins:wins.length, deals:deals.length, rRcnt:rR.length, fRcnt:fR.length,
    horaRate, dealRate,
    riichiRate:tr?rR.length/tr*100:0,
    fuuroRate:tr?fR.length/tr*100:0,
    tsumoW:tW, ronW:roW,
    rW, fW:fW.length, mW:mW.length,
    avgWin, avgRWin:avg(rW), avgFWin:avg(fW), avgFuuroFreeWin:avg(mW),
    avgOyaWin:avg(oyaWinsSimple), avgKoWin:avg(koWinsSimple),
    riichiWinRate:rR.length?rW.length/rR.length*100:0,
    riichiDealRate:rR.length?rD.length/rR.length*100:0,
    ippatsuRate:rR.length?ippatsuW.length/rR.length*100:0,
    ippatsuCnt:ippatsuW.length,
    firstRiichiRate:rR.length?firstRiichi.length/rR.length*100:0,
    rDcnt:rD.length,
    totalUra, avgUra:rR.length?totalUra/rR.length:0,
    totalDora, avgDora:wins.length?totalDora/wins.length:0,
    totalAka,  avgAka:wins.length?totalAka/wins.length:0,
    scoringEff, dealLoss, adjustedEff, roundIncome, avgFinalPts,
    fuuroByCount,
    luckyBonus,
  };
}

function PieChart({ segs }) {
  const total = segs.reduce((s,x)=>s+x.v,0);
  if (!total) return <div style={{padding:"8px",color:"var(--tx3)",fontSize:12}}>データなし</div>;
  const size=110, cx=size/2, cy=size/2, r=size/2-3;
  let cum=0;
  const paths=segs.map(s=>{
    if(!s.v) return null;
    const a1=cum/total*Math.PI*2-Math.PI/2, a2=(cum+s.v)/total*Math.PI*2-Math.PI/2; cum+=s.v;
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    return{d:`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${a2-a1>Math.PI?1:0},1 ${x2},${y2} Z`,c:s.c,l:s.l,v:s.v};
  }).filter(Boolean);
  return(
    <div className="pw">
      <svg width={size} height={size} style={{flexShrink:0}}>
        {paths.map((p,i)=><path key={i} d={p.d} fill={p.c}/>)}
      </svg>
      <div className="pl">
        {segs.map((s,i)=>(
          <div key={i} className="pli">
            <div className="pd" style={{background:s.c}}/>
            <span>{s.l}: {s.v}回 ({f1(s.v/total*100)}%)</span>
          </div>
        ))}
      </div>
    </div>
  );
}
